worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    server {
        listen 3100;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Resolve container names via Podman's network DNS — prevents stale IPs after restarts
        resolver 10.90.0.1 valid=10s ipv6=off;
        set $orchestrator http://gizmo-orchestrator:9100;

        # SPA fallback — no cache on index.html so deploys take effect immediately
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Static assets (hashed filenames) — cache forever
        location /_app/immutable/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # API proxy
        location /api/ {
            proxy_pass $orchestrator;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            client_max_body_size 500M;
        }

        # WebSocket proxy
        location /ws/ {
            proxy_pass $orchestrator;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Health check
        location /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"gizmo-ui"}';
        }
    }
}
