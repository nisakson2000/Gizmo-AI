version: "3.8"

networks:
  gizmo-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.90.0.0/24

services:

  gizmo-llama:
    image: gizmo-llama:latest
    container_name: gizmo-llama
    networks:
      - gizmo-net
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models:ro,Z
    devices:
      - nvidia.com/gpu=all
    security_opt:
      - label=disable
    command: >
      --model /models/Huihui-Qwen3.5-9B-abliterated.Q8_0.gguf
      --mmproj /models/mmproj/Huihui-Qwen3.5-9B-abliterated.mmproj-Q8_0.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 32768
      --n-gpu-layers 99
      --flash-attn on
      --cache-type-k q8_0
      --cache-type-v q8_0
      --batch-size 4096
      --ubatch-size 1024
      --threads 8
      --parallel 2
      --cont-batching
      --chat-template-file /models/chat_template.jinja
      --log-disable
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  gizmo-searxng:
    image: docker.io/searxng/searxng:latest
    container_name: gizmo-searxng
    networks:
      - gizmo-net
    ports:
      - "8300:8080"
    volumes:
      - ./services/searxng/config:/etc/searxng:rw,Z
    environment:
      - SEARXNG_BASE_URL=http://gizmo-searxng:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

  gizmo-tts:
    build:
      context: ./services/tts
      dockerfile: Dockerfile
    image: gizmo-tts:latest
    container_name: gizmo-tts
    networks:
      - gizmo-net
    ports:
      - "8400:8400"
    volumes:
      - ./models/qwen3-tts:/models/qwen3-tts:ro,Z
    devices:
      - nvidia.com/gpu=all
    security_opt:
      - label=disable
    environment:
      - TTS_MODEL_DIR=/models/qwen3-tts/1.7B-Base
      - TTS_TOKENIZER_DIR=/models/qwen3-tts/tokenizer
      - TTS_IDLE_UNLOAD_SECONDS=60
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8400/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  gizmo-orchestrator:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    image: gizmo-orchestrator:latest
    container_name: gizmo-orchestrator
    networks:
      - gizmo-net
    ports:
      - "9100:9100"
    security_opt:
      - label=disable
    volumes:
      - ./config:/app/config:ro,Z
      - ./memory:/app/memory:rw,Z
      - ./logs:/app/logs:rw,Z
      - ./voices:/app/voices:rw,Z
      - ./media:/app/media:rw,Z
      - ./tracker:/app/tracker:rw,Z
      - /run/user/1000/podman/podman.sock:/run/podman/podman.sock
    environment:
      - LLAMA_HOST=gizmo-llama
      - LLAMA_PORT=8080
      - SEARXNG_HOST=gizmo-searxng
      - SEARXNG_PORT=8080
      - TTS_HOST=gizmo-tts
      - TTS_PORT=8400
      - WHISPER_HOST=gizmo-whisper
      - WHISPER_PORT=8000
      - MODEL_NAME=Huihui-Qwen3.5-9B-abliterated.Q8_0
      - MEDIA_HOST_DIR=${PWD}/media
    depends_on:
      - gizmo-llama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  gizmo-whisper:
    image: docker.io/fedirz/faster-whisper-server:0.5.0-cpu
    container_name: gizmo-whisper
    networks:
      - gizmo-net
    ports:
      - "8200:8000"
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-base
    volumes:
      - ./models/whisper-cache:/root/.cache/huggingface:Z
    security_opt:
      - label=disable
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  gizmo-ui:
    build:
      context: ./services/ui
      dockerfile: Dockerfile
    image: gizmo-ui:latest
    container_name: gizmo-ui
    networks:
      - gizmo-net
    ports:
      - "3100:3100"
    environment:
      - ORCHESTRATOR_URL=http://gizmo-orchestrator:9100
    depends_on:
      - gizmo-orchestrator
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
