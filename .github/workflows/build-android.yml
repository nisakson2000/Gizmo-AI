name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ startsWith(github.ref, 'refs/tags/') && '0' || '1' }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore persistent debug keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          mkdir -p ~/.android
          if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
            echo "$DEBUG_KEYSTORE_BASE64" | base64 -d > ~/.android/debug.keystore
            echo "Persistent debug keystore restored — APKs signed with the same cert across releases."
          else
            echo "::warning::DEBUG_KEYSTORE_BASE64 secret not set. Gradle will generate an ephemeral keystore, so users will NOT be able to upgrade in place from this release."
          fi

      - name: Build APK
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/gizmo.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gizmo
          path: mobile/android/app/build/outputs/apk/debug/gizmo.apk

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ "$PREV_TAG" = "$TAG" ] || [ -z "$PREV_TAG" ]; then
            COMMITS="Initial release"
          else
            COMMITS=$(git log --pretty=format:"- %s" "${PREV_TAG}..${TAG}" -- . ':!.github' | head -20)
          fi
          {
            echo "body<<NOTES_EOF"
            echo "## Gizmo for Android"
            echo ""
            echo "Native Android app for one-tap access to your Gizmo instance."
            echo ""
            echo "### What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "---"
            echo ""
            echo "### Install"
            echo ""
            echo "1. Download **gizmo.apk** below"
            echo "2. Enable \"Install unknown apps\" on your Android device"
            echo "3. Open the APK and install"
            echo "4. Launch Gizmo, enter your server URL, and connect"
            echo ""
            echo "**Requirements:** Android 8.0+ • A running Gizmo server • HTTPS for voice input"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Gizmo for Android — ${{ github.ref_name }}"
          body: ${{ steps.notes.outputs.body }}
          make_latest: "true"
          files: mobile/android/app/build/outputs/apk/debug/gizmo.apk
