name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/gizmo-ai.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gizmo-ai
          path: mobile/android/app/build/outputs/apk/debug/gizmo-ai.apk

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Gizmo AI for Android — ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            ## Gizmo AI for Android

            Native Android app for one-tap access to your Gizmo-AI instance.

            ### Install

            1. Download **gizmo-ai.apk** below
            2. Enable "Install unknown apps" on your Android device
            3. Open the APK and install
            4. Launch Gizmo AI, enter your server URL, and connect

            **Requirements:** Android 8.0+ • A running Gizmo-AI server • HTTPS for voice input
          files: mobile/android/app/build/outputs/apk/debug/gizmo-ai.apk
