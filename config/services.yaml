services:
  llama:
    container: gizmo-llama
    host: gizmo-llama
    port: 8080
    host_port: 8080
    gpu: true
    health: /health
    description: "llama.cpp model inference server"

  orchestrator:
    container: gizmo-orchestrator
    host: gizmo-orchestrator
    port: 9100
    host_port: 9100
    gpu: false
    health: /health
    description: "FastAPI orchestrator — routing, streaming, tools"

  ui:
    container: gizmo-ui
    host: gizmo-ui
    port: 3100
    host_port: 3100
    gpu: false
    health: /health
    description: "SvelteKit web UI served via nginx"

  searxng:
    container: gizmo-searxng
    host: gizmo-searxng
    port: 8080
    host_port: 8300
    gpu: false
    health: /
    description: "SearXNG — self-hosted web search"

  tts:
    container: gizmo-tts
    host: gizmo-tts
    port: 8400
    host_port: 8400
    gpu: true
    health: /health
    description: "Qwen3-TTS — GPU-accelerated streaming TTS with voice cloning (via faster-qwen3-tts)"

  whisper:
    container: gizmo-whisper
    host: gizmo-whisper
    port: 8000
    host_port: 8200
    gpu: false
    health: /health
    description: "faster-whisper — CPU-based speech-to-text transcription"

  stack_control:
    container: null  # host-side systemd user service, not a podman container
    host: localhost
    port: 9101
    host_port: 9101
    gpu: false
    health: /health
    description: "Stack control — host-side start/stop API for remote clients (runs outside podman)"
